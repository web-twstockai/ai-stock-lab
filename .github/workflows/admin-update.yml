name: Admin Data Update

on:
  schedule:
    # Asia/Taipei 15:45, Monday-Friday. Watch Europe macro releases.
    - cron: "45 7 * * 1-5"
    # Asia/Taipei 20:25, Monday-Friday. Watch US macro releases.
    - cron: "25 12 * * 1-5"
    # Asia/Taipei 18:30, Monday-Friday.
    - cron: "30 10 * * 1-5"
  workflow_dispatch:
    inputs:
      task:
        description: Update task to run
        required: true
        type: choice
        options:
          - daily-market
          - evening-batch
          - intelligence
          - institutional
          - macro
          - macro-due-check
          - macro-watch-europe
          - macro-watch-us
          - short-margin
          - all
      operator:
        description: Admin account that triggered the update
        required: false
        default: admin

permissions:
  contents: write

# Queue every data update in one lane. Manual runs never cancel scheduled runs,
# and scheduled runs still get their own execution when the clock reaches them.
concurrency:
  group: admin-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Resolve task
        id: task
        shell: bash
        run: |
          set -euo pipefail
          task="${{ inputs.task }}"
          operator="${{ inputs.operator }}"

          if [ "${{ github.event_name }}" = "schedule" ]; then
            operator="github-schedule"
            case "${{ github.event.schedule }}" in
              "45 7 * * 1-5")
                task="macro-watch-europe"
                ;;
              "25 12 * * 1-5")
                task="macro-watch-us"
                ;;
              "30 10 * * 1-5")
                task="evening-batch"
                ;;
              *)
                echo "Unknown schedule: ${{ github.event.schedule }}" >&2
                exit 2
                ;;
            esac
          fi

          echo "task=$task" >> "$GITHUB_OUTPUT"
          echo "operator=${operator:-admin}" >> "$GITHUB_OUTPUT"

      - name: Run selected update
        shell: bash
        run: |
          set -euo pipefail
          echo "Triggered by: ${{ steps.task.outputs.operator }}"
          echo "Task: ${{ steps.task.outputs.task }}"

          case "${{ steps.task.outputs.task }}" in
            daily-market)
              python scripts/update_daily_history.py --all --workers 12 --rebuild-site-data --update-candidates --quiet
              ;;
            evening-batch)
              python scripts/update_daily_history.py --all --workers 12 --rebuild-site-data --update-candidates --quiet
              python scripts/update_institutional_robot.py
              ;;
            intelligence)
              python scripts/update_intelligence.py --target all
              ;;
            institutional)
              python scripts/update_institutional_robot.py
              ;;
            macro)
              python scripts/update_macro_robot.py
              ;;
            macro-due-check)
              python scripts/macro_auto_updater.py --once --grace-seconds 120
              ;;
            macro-watch-europe)
              python scripts/macro_auto_updater.py --max-seconds 10800 --poll-seconds 60 --retry-seconds 180 --grace-seconds 10 --commit-after-update
              ;;
            macro-watch-us)
              python scripts/macro_auto_updater.py --max-seconds 21000 --poll-seconds 60 --retry-seconds 180 --grace-seconds 10 --commit-after-update
              ;;
            short-margin)
              python scripts/update_short_margin_ratio.py
              ;;
            all)
              python scripts/update_daily_history.py --all --workers 12 --rebuild-site-data --update-candidates --quiet
              python scripts/update_intelligence.py --target all
              python scripts/update_short_margin_ratio.py
              ;;
            *)
              echo "Unknown task: ${{ steps.task.outputs.task }}" >&2
              exit 2
              ;;
          esac

      - name: Rebuild public package
        run: python scripts/build_public_dist.py

      - name: Commit updated data
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ai-stock-lab-bot"
          git config user.email "ai-stock-lab-bot@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "Update public data via task ${{ steps.task.outputs.task }}"
          git status --short
          git restore --worktree .
          git pull --rebase origin main
          git push
