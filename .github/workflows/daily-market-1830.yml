name: Daily Market Update

on:
  schedule:
    # GitHub Actions uses UTC. Taiwan time is UTC+8.
    - cron: "30 10 * * *"  # 18:30 Taiwan time, every day.
  workflow_dispatch:
    inputs:
      operator:
        description: Operator that triggered the update
        required: false
        default: admin

permissions:
  contents: write

concurrency:
  group: daily-market-update
  cancel-in-progress: false

jobs:
  update-daily-market:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run daily market updater
        shell: bash
        run: |
          set -euo pipefail
          echo "Triggered by: ${{ github.event_name == 'schedule' && 'github-schedule' || inputs.operator }}"
          python scripts/update_daily_history.py --all --workers 12 --rebuild-site-data --update-candidates --quiet

      - name: Rebuild public package
        run: python scripts/build_public_dist.py

      - name: Commit updated daily market data
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ai-stock-lab-bot"
          git config user.email "ai-stock-lab-bot@users.noreply.github.com"

          git add data
          if git diff --cached --quiet; then
            echo "No daily market data changes to commit."
            exit 0
          fi

          git commit -m "Update daily market data"

          # Keep generated validation output out of this data commit.
          git restore --worktree .
          git clean -fd public-dist || true

          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push; then
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; retrying after remote sync."
            sleep 10
          done

          echo "Unable to push daily market update after retries." >&2
          exit 1
